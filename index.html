<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Produzione Aziendale</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 text-gray-800 p-6 font-sans">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 flex justify-between items-center border-b pb-4 border-gray-200">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">Gestione Produzione</h1>
                <p class="text-gray-500">Monitoraggio tempi, code di stampa e archivio</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 bg-white p-6 rounded-xl shadow-sm border border-gray-200 h-fit">
                <h2 class="text-xl font-semibold mb-4 text-gray-800">Nuovo Lavoro</h2>
                <form id="jobForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Nome Bozza / Cliente</label>
                        <input type="text" id="jobName" required class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Data Inizio</label>
                            <input type="date" id="startDate" required class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Data Consegna</label>
                            <input type="date" id="endDate" required class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Tempo Avviamento Macchina</label>
                        <div class="flex items-center gap-2">
                            <input type="number" id="setupTime" min="0" required class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="Es. 15">
                            <span class="text-sm text-gray-500">minuti</span>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Tipologia di Produzione</label>
                        <div class="grid grid-cols-2 md:grid-cols-2 gap-2" id="productionTypes">
                            <div>
                                <input type="radio" id="stampa_digitale" name="prodType" value="Stampa Digitale" class="hidden prod-radio" required>
                                <label for="stampa_digitale" class="block text-center p-2 border border-gray-300 rounded-lg cursor-pointer hover:bg-gray-100 text-sm">🖨️ Digitale</label>
                            </div>
                            <div>
                                <input type="radio" id="stampa_uv" name="prodType" value="Stampa UV" class="hidden prod-radio">
                                <label for="stampa_uv" class="block text-center p-2 border border-gray-300 rounded-lg cursor-pointer hover:bg-gray-100 text-sm">☀️ UV</label>
                            </div>
                            <div>
                                <input type="radio" id="ricamo" name="prodType" value="Ricamo" class="hidden prod-radio">
                                <label for="ricamo" class="block text-center p-2 border border-gray-300 rounded-lg cursor-pointer hover:bg-gray-100 text-sm">🧵 Ricamo</label>
                            </div>
                            <div>
                                <input type="radio" id="pressa" name="prodType" value="Pressa" class="hidden prod-radio">
                                <label for="pressa" class="block text-center p-2 border border-gray-300 rounded-lg cursor-pointer hover:bg-gray-100 text-sm">♨️ Pressa</label>
                            </div>
                            <div class="col-span-2">
                                <input type="radio" id="dtf" name="prodType" value="DTF" class="hidden prod-radio">
                                <label for="dtf" class="block text-center p-2 border border-gray-300 rounded-lg cursor-pointer hover:bg-gray-100 text-sm font-bold">🎞️ DTF</label>
                            </div>
                        </div>
                    </div>

                    <div id="dtfFields" class="hidden bg-blue-50 p-4 rounded-lg border border-blue-100 grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-blue-800 mb-1">N° Loghi stampati</label>
                            <input type="number" id="dtfLogos" min="0" class="w-full p-2 border border-blue-200 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-blue-800 mb-1">Metri lineari (m)</label>
                            <input type="number" id="dtfMeters" min="0" step="0.1" class="w-full p-2 border border-blue-200 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none">
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-gray-900 text-white font-bold py-3 rounded-lg hover:bg-gray-800 transition shadow-md">
                        Aggiungi alla Coda
                    </button>
                </form>
            </div>

            <div class="lg:col-span-8 space-y-8">
                <div>
                    <h2 class="text-xl font-semibold mb-4 text-gray-800 flex items-center">
                        Coda di Produzione
                        <span class="ml-2 text-sm font-normal text-gray-500 bg-gray-200 px-2 py-0.5 rounded-full" id="activeCount">0</span>
                    </h2>
                    <div id="jobList" class="space-y-4"></div>
                </div>

                <div>
                    <h2 class="text-xl font-semibold mb-4 text-gray-800 flex items-center border-t border-gray-300 pt-6">
                        Archivio Lavori Completati
                    </h2>
                    <div id="archiveList" class="space-y-4 opacity-80"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let jobs = [];

        const radios = document.querySelectorAll('input[name="prodType"]');
        const dtfFields = document.getElementById('dtfFields');
        radios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                if(e.target.value === 'DTF') {
                    dtfFields.classList.remove('hidden');
                } else {
                    dtfFields.classList.add('hidden');
                    document.getElementById('dtfLogos').value = '';
                    document.getElementById('dtfMeters').value = '';
                }
            });
        });

        document.getElementById('jobForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const prodType = document.querySelector('input[name="prodType"]:checked').value;
            
            const newJob = {
                id: Date.now(),
                name: document.getElementById('jobName').value,
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value,
                setupTime: parseInt(document.getElementById('setupTime').value) || 0,
                type: prodType,
                dtfLogos: prodType === 'DTF' ? document.getElementById('dtfLogos').value : null,
                dtfMeters: prodType === 'DTF' ? document.getElementById('dtfMeters').value : null,
                status: 'todo',
                actualStartTime: null,
                actualEndTime: null
            };

            jobs.push(newJob);
            this.reset();
            dtfFields.classList.add('hidden');
            renderUI();
        });

        function startJob(id) {
            const job = jobs.find(j => j.id === id);
            if(job) {
                job.status = 'inprogress';
                job.actualStartTime = new Date().toISOString();
                renderUI();
            }
        }

        function finishJob(id) {
            const job = jobs.find(j => j.id === id);
            if(job) {
                job.status = 'done';
                job.actualEndTime = new Date().toISOString();
                renderUI();
            }
        }

        function deleteJob(id) {
            jobs = jobs.filter(job => job.id !== id);
            renderUI();
        }

        function formatTime(isoString) {
            if (!isoString) return '';
            const d = new Date(isoString);
            return d.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
        }
        
        function formatDate(isoString) {
            if (!isoString) return '';
            const d = new Date(isoString);
            return d.toLocaleDateString('it-IT');
        }

        function renderUI() {
            const listContainer = document.getElementById('jobList');
            const archiveContainer = document.getElementById('archiveList');
            
            listContainer.innerHTML = '';
            archiveContainer.innerHTML = '';

            let activeJobs = jobs.filter(j => j.status !== 'done');
            activeJobs.sort((a, b) => new Date(a.endDate) - new Date(b.endDate));
            document.getElementById('activeCount').innerText = activeJobs.length;

            if (activeJobs.length === 0) {
                listContainer.innerHTML = '<p class="text-gray-500 italic">Nessun lavoro in coda.</p>';
            } else {
                activeJobs.forEach(job => listContainer.innerHTML += createCardHTML(job));
            }

            let doneJobs = jobs.filter(j => j.status === 'done');
            doneJobs.sort((a, b) => new Date(b.actualEndTime) - new Date(a.actualEndTime));

            if (doneJobs.length === 0) {
                archiveContainer.innerHTML = '<p class="text-gray-500 italic text-sm">Nessun lavoro archiviato.</p>';
            } else {
                doneJobs.forEach(job => archiveContainer.innerHTML += createArchiveCardHTML(job));
            }
        }

        function createCardHTML(job) {
            const today = new Date();
            const deliveryDate = new Date(job.endDate);
            const isUrgent = (Math.ceil(Math.abs(deliveryDate - today) / (1000 * 60 * 60 * 24)) <= 3) && (deliveryDate >= today);
            
            let dtfInfo = job.type === 'DTF' ? `<div class="mt-2 text-sm bg-blue-50 px-2 py-1 rounded text-blue-800 border border-blue-100 inline-block">Loghi: ${job.dtfLogos || 0} | Metri: ${job.dtfMeters || 0}m</div>` : '';

            let actionArea = '';
            if (job.status === 'todo') {
                actionArea = `<button onclick="startJob(${job.id})" class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded shadow transition text-sm flex items-center gap-1">▶️ Avvia</button>`;
            } else if (job.status === 'inprogress') {
                actionArea = `
                    <div class="text-right">
                        <span class="block text-xs text-green-600 font-bold mb-1 animate-pulse">In lavorazione dalle ${formatTime(job.actualStartTime)}</span>
                        <button onclick="finishJob(${job.id})" class="bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded shadow transition text-sm flex items-center gap-1 w-full justify-center">⏹️ Termina</button>
                    </div>`;
            }

            return `
                <div class="bg-white p-4 rounded-xl shadow-sm border ${isUrgent ? 'border-red-400 border-l-4' : 'border-gray-200 border-l-4 border-l-blue-500'} flex flex-col md:flex-row justify-between items-start md:items-center gap-4 transition hover:shadow-md">
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-1">
                            <h3 class="font-bold text-lg text-gray-900">${job.name}</h3>
                            ${isUrgent ? '<span class="bg-red-100 text-red-700 text-xs font-bold px-2 py-1 rounded">URGENTE</span>' : ''}
                        </div>
                        <span class="inline-block bg-gray-100 text-gray-700 text-xs font-semibold px-2 py-1 rounded">Reparto: ${job.type}</span>
                        <span class="inline-block text-gray-500 text-xs ml-2">⏱️ Avviamento: ${job.setupTime} min</span>
                        <br>${dtfInfo}
                    </div>
                    <div class="text-sm text-gray-600 border-l pl-4 border-gray-100">
                        <p>Scadenza: <strong class="text-gray-900">${formatDate(job.endDate)}</strong></p>
                    </div>
                    <div class="w-full md:w-auto mt-2 md:mt-0">
                        ${actionArea}
                    </div>
                </div>
            `;
        }

        function createArchiveCardHTML(job) {
            const start = new Date(job.actualStartTime);
            const end = new Date(job.actualEndTime);
            const prodTimeMin = Math.round((end - start) / 60000);
            const totalTime = job.setupTime + prodTimeMin;

            let dtfInfo = job.type === 'DTF' ? ` | Loghi: ${job.dtfLogos} | ${job.dtfMeters}m` : '';

            return `
                <div class="bg-gray-100 p-4 rounded-xl border border-gray-200 flex flex-col md:flex-row justify-between items-center gap-4">
                    <div class="flex-1">
                        <h3 class="font-bold text-gray-700 line-through decoration-gray-400">${job.name}</h3>
                        <p class="text-xs text-gray-500 mt-1">${job.type}${dtfInfo}</p>
                    </div>
                    <div class="text-xs text-gray-600 bg-white p-2 rounded border border-gray-200 shadow-sm text-center">
                        <p>Inizio: <strong>${formatTime(job.actualStartTime)}</strong> - Fine: <strong>${formatTime(job.actualEndTime)}</strong></p>
                        <p class="mt-1 text-blue-700 font-semibold">Tempo Totale: ${totalTime} min <span class="text-gray-400 font-normal">(Avvi. ${job.setupTime}m + Prod. ${prodTimeMin}m)</span></p>
                    </div>
                    <div class="text-xs text-gray-500 text-right">
                        Completato il<br><strong class="text-gray-700">${formatDate(job.actualEndTime)}</strong>
                    </div>
                    <button onclick="deleteJob(${job.id})" class="text-gray-400 hover:text-red-500" title="Elimina definitivamente">
                        🗑️
                    </button>
                </div>
            `;
        }

        renderUI();
    </script>
</body>
</html>
